<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZERKAL</title>

<style>

body{
margin:0;
background:#090909;
color:white;
font-family:Segoe UI, sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:90%;
max-width:1200px;
}

.logo{
font-size:4rem;
font-weight:700;
letter-spacing:8px;
}

.subtitle{
color:#888;
margin-top:10px;
margin-bottom:50px;
}

.status{
display:flex;
gap:30px;
margin-bottom:50px;
}

.card{
flex:1;
background:#111;
border:1px solid #222;
padding:25px;
border-radius:12px;
}

.value{
font-size:2rem;
margin-top:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.btn{
background:#111;
border:1px solid #333;
padding:30px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
font-size:1rem;
}

.btn:hover{
transform:translateY(-4px);
border-color:#00ffaa;
}

</style>
</head>
<body>

<div class="container">

<div class="logo">ZERKAL</div>

<div class="subtitle">
Command & Intelligence System
</div>

<div class="status">

<div class="card">
Servidor
<div class="value">ONLINE</div>
</div>

<div class="card">
Operadores
<div class="value">--</div>
</div>

<div class="card">
Eventos
<div class="value">0</div>
</div>

</div>

<div class="grid">

<div class="btn">🗺️ MAPA</div>
<div class="btn">📋 OPERACIONES</div>
<div class="btn">⚠️ EVENTOS</div>

<div class="btn">📡 INTEL</div>
<div class="btn">📊 ESTADÍSTICAS</div>
<div class="btn">⚙️ ADMIN</div>

</div>

</div>

</body>
</html>
